<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abyss Minecraft</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
</head>
<body>
<div class="overlay"></div>
<div class="particles"></div>
<main>
    <h1>ABYSS</h1>
    <p class="subtitle">Minecraft survival.</p>
    <div class="ip-box">mc.abyss.work.gd</div>
    <div class="buttons">
        <button class="btn secondary" onclick="copyIP()">COPY IP</button>
        <button class="btn primary" onclick="startServer()">START SERVER</button>
    </div>
    <div class="status">
        <span class="dot"></span>
        <span id="status-text">Loading server status...</span>
    </div>
</main>
<footer>© 2026 Abyss</footer>
<script src="script.js"></script>
</body>
</html>
